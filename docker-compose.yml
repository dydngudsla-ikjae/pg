services:

  # ?А?А Infrastructure ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  postgres:
    image: postgres:16-alpine
    container_name: pg-postgres
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: postgres
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pg-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    container_name: pg-kafka
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ?А?А Application Services ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  mock-pg:
    build:
      context: .
      dockerfile: services/mock-pg/Dockerfile
    container_name: pg-mock-pg
    ports:
      - "8090:8090"

  merchant:
    build:
      context: .
      dockerfile: services/merchant/Dockerfile
    container_name: pg-merchant
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - DB_NAME=merchant_db
      - DB_USER=pguser
      - DB_PASS=pgpass
    depends_on:
      postgres:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    container_name: pg-payment
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_NAME=payment_db
      - DB_USER=pguser
      - DB_PASS=pgpass
      - REDIS_HOST=redis
      - KAFKA_SERVERS=kafka:9092
      - VIRTUAL_ACCOUNT_HOST=virtual-account
      - MOCK_PG_HOST=mock-pg
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  virtual-account:
    build:
      context: .
      dockerfile: services/virtual-account/Dockerfile
    container_name: pg-virtual-account
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - DB_NAME=va_db
      - DB_USER=pguser
      - DB_PASS=pgpass
      - KAFKA_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  billing:
    build:
      context: .
      dockerfile: services/billing/Dockerfile
    container_name: pg-billing
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=postgres
      - DB_NAME=billing_db
      - DB_USER=pguser
      - DB_PASS=pgpass
      - KAFKA_SERVERS=kafka:9092
      - PAYMENT_HOST=payment
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  settlement:
    build:
      context: .
      dockerfile: services/settlement/Dockerfile
    container_name: pg-settlement
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=postgres
      - DB_NAME=settlement_db
      - DB_USER=pguser
      - DB_PASS=pgpass
      - KAFKA_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    container_name: pg-notification
    ports:
      - "8086:8086"
    environment:
      - DB_HOST=postgres
      - DB_NAME=notification_db
      - DB_USER=pguser
      - DB_PASS=pgpass
      - KAFKA_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: pg-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - PAYMENT_HOST=payment
      - MERCHANT_HOST=merchant
      - VIRTUAL_ACCOUNT_HOST=virtual-account
      - BILLING_HOST=billing
      - SETTLEMENT_HOST=settlement
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
